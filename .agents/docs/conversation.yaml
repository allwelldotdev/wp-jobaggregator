      ## Part 4: Testing

      Install PHPUnit and the WordPress test suite via Composer and WP-CLI:

      ```bash
      # From your plugin directory
      composer require --dev phpunit/phpunit yoast/phpunit-polyfills

      # Install the WP test library (LocalWP ships with this capability)
      wp scaffold plugin-tests job-aggregator
      bash bin/install-wp-tests.sh wordpress_test root root localhost latest
      ```

      Your tests should cover three areas. **Unit tests** mock HTTP calls and test parsing logic in isolation — use fixtures in `tests/fixtures/` so tests never make real network requests. **Integration tests** verify that `PostCreator` correctly creates WP posts given a normalized `JobDTO`. **Duplicate detection tests** confirm that the same job run twice produces only one post.

      Run the full suite from the plugin root:

      ```bash
      ./vendor/bin/phpunit --configuration phpunit.xml
      ```

      ---

      ## Part 5: Things Worth Noting That Are Easy to Overlook

      **Rate limiting and politeness.** RSS feeds and APIs have request limits. Build a minimum interval between requests for the same source (e.g., cache the last-fetched timestamp in a transient) and respect `Retry-After` headers from APIs.

      **Job expiry.** Jobs have a shelf life. Add a scheduled cron task that unpublishes or deletes posts older than a configurable number of days (e.g., 30 or 60), or check the job's `validThrough` field if the source provides it.

      **Custom Post Type.** If your site does not already have a `job_listing` CPT, register one. Consider using the **WP Job Manager** plugin as the CPT layer — it provides a solid, widely-supported schema for job posts and many theme integrations, saving you from building the display layer from scratch.

      **Logging.** Write a lightweight logger that stores run results (source name, jobs fetched, jobs created, errors) to a custom database table or WP options. This makes debugging production issues far easier and gives you an audit trail.

      **Composer autoloading.** Add PSR-4 autoloading to `composer.json` so you never write a `require` statement manually:

      ```json
      {
          "autoload": {
              "psr-4": { "JobAggregator\\": "src/" }
          }
      }
      ```

      Then run `composer dump-autoload` after adding new classes.

      **Environment parity.** Keep `wp-config-local.php` (with local DB credentials and `WP_DEBUG = true`) separate from your production config. Use a `.gitignore` that excludes `vendor/`, `wp-config.php`, and any file containing API keys.

      This architecture scales cleanly: adding a new job board requires only a new entry in `config/sources.php` for RSS feeds, or a new class implementing `SourceInterface` for a non-standard API — nothing else in the core logic changes.
