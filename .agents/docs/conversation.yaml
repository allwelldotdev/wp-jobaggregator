      # WordPress Job Aggregator: Local Development & Implementation Guide

      This guide covers the full workflow — from pulling your live site into LocalWP through to a well-structured, testable plugin for multi-source job aggregation.

      ---

      ## Part 1: Migrating Your Live Site to LocalWP

      Your instinct to export and import is sound, and the standard approach is to use **Duplicator** (free tier) or **All-in-One WP Migration**. Both plugins package your database and files into a single archive that LocalWP can consume after you create a blank local site. That said, here is a cleaner CLI-first workflow that avoids plugin overhead:

      **On the live server (via SSH):**
      ```bash
      # Export the database
      mysqldump -u DB_USER -p DB_NAME > site_backup.sql

      # Archive wp-content (themes, plugins, uploads)
      tar -czf wp-content-backup.tar.gz wp-content/

      # Download both to your local machine
      scp user@yourserver.com:~/site_backup.sql .
      scp user@yourserver.com:~/wp-content-backup.tar.gz .
      ```

      **In LocalWP:** Create a new blank WordPress site, then replace its `wp-content` with your archive and import the database via the built-in Adminer (LocalWP's database GUI) or the shell tab:

      ```bash
      mysql -u root -p local < site_backup.sql
      ```

      Finally, run a search-replace on URLs using WP-CLI, which LocalWP ships with:

      ```bash
      wp search-replace 'https://yourlivedomain.com' 'http://yourlocalsite.local' --all-tables
      ```

      This is faster, dependency-free, and gives you full control. **WP-CLI will be your best friend throughout this project** — keep it in mind for every step.

