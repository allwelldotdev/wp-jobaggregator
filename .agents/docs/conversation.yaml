      ## Part 2: Plugin Architecture & Folder Structure

      Build this as a **custom plugin**, not a theme function. This keeps the logic portable, testable, and independent of your theme. Place everything under:

      ```
      wp-content/plugins/job-aggregator/
      ```

      Here is the recommended folder structure:

      ```
      job-aggregator/
      ├── job-aggregator.php          # Plugin bootstrap & metadata header
      ├── composer.json               # Dependency management (e.g. SimplePie, Guzzle)
      ├── composer.lock
      ├── vendor/                     # Composer dependencies (gitignored)
      │
      ├── src/
      │   ├── Plugin.php              # Core plugin class; registers hooks & schedules
      │   ├── PostCreator.php         # Creates/updates WP job posts from normalized data
      │   ├── DuplicateChecker.php    # Prevents re-publishing the same job
      │   │
      │   ├── Sources/
      │   │   ├── SourceInterface.php # Contract all sources must implement
      │   │   ├── AbstractSource.php  # Shared retry, logging, error handling logic
      │   │   ├── RssFeedSource.php   # Generic RSS/Atom parser (covers MyJobMag etc.)
      │   │   └── JoobleApiSource.php # Jooble REST API integration
      │   │
      │   └── Admin/
      │       ├── SettingsPage.php    # WP admin UI for API keys, feed URLs, toggles
      │       └── LogViewer.php       # Displays run history & errors in the admin
      │
      ├── config/
      │   └── sources.php             # Declarative list of all RSS feeds and API configs
      │
      ├── templates/
      │   └── admin-log-table.php     # HTML template for the log viewer
      │
      ├── tests/
      │   ├── bootstrap.php           # PHPUnit + WP test environment setup
      │   ├── Unit/
      │   │   ├── RssFeedSourceTest.php
      │   │   ├── JoobleApiSourceTest.php
      │   │   ├── DuplicateCheckerTest.php
      │   │   └── PostCreatorTest.php
      │   └── fixtures/
      │       ├── myjobmag-feed.xml   # Sample RSS response for offline testing
      │       └── jooble-response.json
      │
      └── phpunit.xml
      ```

      The `SourceInterface.php` is central to scalability — every new source (RSS or API) implements the same contract, meaning your core aggregation loop never needs to change as you add sources.

      ```php
      // src/Sources/SourceInterface.php
      interface SourceInterface {
          public function fetchJobs(): array;  // Always returns normalized JobDTO[]
          public function getName(): string;
          public function isEnabled(): bool;
      }
      ```

      ---

      ## Part 3: Multi-Source Configuration & WP Cron Automation

      ### Declarative Source Registry

      Rather than hardcoding sources in PHP logic, define them in `config/sources.php`. Adding a new feed is then a matter of adding one array entry:

      ```php
      // config/sources.php
      return [
          'rss_feeds' => [
              [
                  'name'     => 'MyJobMag Nigeria',
                  'url'      => 'https://www.myjobmag.com/feed',
                  'enabled'  => true,
                  'category' => 'Nigeria',
              ],
              [
                  'name'     => 'MyJobMag Ghana',
                  'url'      => 'https://www.myjobmag.com.gh/feed',
                  'enabled'  => true,
                  'category' => 'Ghana',
              ],
              // Add more RSS feeds here with zero code changes
          ],
          'apis' => [
              [
                  'driver'   => 'jooble',
                  'name'     => 'Jooble',
                  'api_key'  => defined('JOOBLE_API_KEY') ? JOOBLE_API_KEY : '',
                  'enabled'  => true,
                  'params'   => ['keywords' => '', 'location' => 'Nigeria'],
              ],
          ],
      ];
      ```

      Store sensitive values like API keys in `wp-config.php` as constants (`define('JOOBLE_API_KEY', 'xxx');`), never in the config array directly.

      ### WP Cron Setup

      ```php
      // src/Plugin.php (excerpt)
      class Plugin {
          public function register(): void {
              register_activation_hook(JOB_AGGREGATOR_FILE, [$this, 'scheduleCron']);
              register_deactivation_hook(JOB_AGGREGATOR_FILE, [$this, 'clearCron']);
              add_action('job_aggregator_run', [$this, 'runAggregation']);
          }

          public function scheduleCron(): void {
              if (!wp_next_scheduled('job_aggregator_run')) {
                  wp_schedule_event(time(), 'hourly', 'job_aggregator_run');
              }
          }

          public function runAggregation(): void {
              $sources = $this->sourceRegistry->getEnabledSources();
              foreach ($sources as $source) {
                  try {
                      $jobs = $source->fetchJobs();
                      foreach ($jobs as $job) {
                          $this->postCreator->createOrSkip($job);
                      }
                  } catch (\Exception $e) {
                      $this->logger->error($source->getName(), $e->getMessage());
                  }
              }
          }
      }
      ```

      One important note: **WP Cron is not a true system cron** — it only fires when someone visits the site. On a low-traffic local or staging environment this can cause missed runs. Disable WP Cron's default behaviour and trigger it via a real system cron instead:

      ```php
      // In wp-config.php
      define('DISABLE_WP_CRON', true);
      ```

      ```bash
      # In your system crontab (crontab -e)
      */15 * * * * curl -s http://yourlocalsite.local/wp-cron.php?doing_wp_cron > /dev/null 2>&1
      ```

      This gives you predictable, reliable scheduling both locally and in production.

      ### Duplicate Prevention

      Use a combination of a meta field hash and `post_status` checks to avoid republishing the same job:

      ```php
      // src/DuplicateChecker.php
      public function isDuplicate(JobDTO $job): bool {
          $hash = md5($job->sourceUrl . $job->title . $job->company);
          $existing = get_posts([
              'post_type'  => 'job_listing',  // or your CPT slug
              'meta_key'   => '_job_source_hash',
              'meta_value' => $hash,
              'fields'     => 'ids',
          ]);
          return !empty($existing);
      }
      ```

